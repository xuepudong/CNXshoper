# 宝塔 Nginx 伪静态规则（在站点设置 → 伪静态中填入）
# 保护敏感目录与文件

# 禁止访问 includes 目录
location ~ ^/includes/ {
    deny all;
    return 403;
}

# 禁止访问安装锁、SQL、配置等敏感文件
location ~* \.(sql|md|lock|installed)$ {
    deny all;
    return 403;
}

# 禁止访问隐藏文件
location ~ /\. {
    deny all;
    return 403;
}

# 上传目录禁止执行 PHP（防止木马上传后执行）
location ~ ^/uploads/.*\.(php|php5|php7|phtml)$ {
    deny all;
    return 403;
}

# 静态资源缓存
location ~* \.(css|js|jpg|jpeg|png|gif|webp|ico|svg)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
}
